<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Woofly — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body id="page-login">

<div class="toast-container" id="toastContainer"></div>

<div class="login-card">
  <div class="login-logo">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="36" r="36" fill="#1A3B4C"/>
      <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
            font-family="Outfit,sans-serif" font-weight="700" font-size="26" fill="white">WF</text>
      <ellipse cx="24" cy="18" rx="5" ry="4" fill="#E87C5B"/>
      <ellipse cx="36" cy="14" rx="5" ry="4" fill="#E87C5B"/>
      <ellipse cx="48" cy="18" rx="5" ry="4" fill="#E87C5B"/>
      <ellipse cx="18" cy="27" rx="4" ry="3.5" fill="#E87C5B"/>
    </svg>
    <div class="brand">Woofly</div>
  </div>

  <h1 class="login-title">Bienvenido a Woofly</h1>
  <p class="login-sub">El cuidado que tu mascota merece</p>

  <div class="form-group">
    <label class="form-label">
      <i data-lucide="user" width="15" height="15"></i> Usuario
    </label>
    <div class="input-wrap">
      <input class="form-input" id="loginUser" type="text" placeholder="Ingrese su usuario" />
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">
      <i data-lucide="lock" width="15" height="15"></i> Contraseña
    </label>
    <div class="input-wrap">
      <input class="form-input" id="loginPass" type="password" placeholder="Ingrese su contraseña" />
      <button class="toggle-pwd" onclick="togglePwd()">
        <i data-lucide="eye" id="eyeIcon" width="18" height="18"></i>
      </button>
    </div>
  </div>

  <button class="btn-primary" onclick="doLogin()">Iniciar Sesión</button>
  <div class="login-register" onclick="showToast('Registro próximamente disponible','info')">
    ¿No tienes cuenta? Regístrate aquí
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/login.js"></script>
</body>
</html>
